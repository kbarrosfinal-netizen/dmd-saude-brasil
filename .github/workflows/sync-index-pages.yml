name: Sync index.html for GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "*.html"
      - ".github/workflows/sync-index-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select source HTML
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE=$(ls -1t index-*.html 2>/dev/null | head -n 1 || true)

          if [ -z "$CANDIDATE" ]; then
            echo "Nenhum arquivo index-*.html encontrado."
            exit 1
          fi

          echo "source=$CANDIDATE" >> "$GITHUB_OUTPUT"

      - name: Sync to index.html
        shell: bash
        run: |
          set -euo pipefail
          SRC='${{ steps.pick.outputs.source }}'
          cp "$SRC" index.html

      - name: Commit synchronized index.html
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "chore: sync index.html for Pages"
          git push
