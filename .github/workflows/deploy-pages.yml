name: "🚀 Deploy GitHub Pages — DMD Dashboard"

# Deploy: ativado em push ao main (qualquer alteração no index.html) OU manualmente
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "index_supabase.html"
      - "pipeline/pages/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: "📄 Deploy Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Preparar deploy
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp index_supabase.html _site/index_supabase.html 2>/dev/null || true
          cp .nojekyll _site/.nojekyll 2>/dev/null || touch _site/.nojekyll
          echo "Dashboard copiado para deploy"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
